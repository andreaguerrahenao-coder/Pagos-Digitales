<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pagos Digitales - Surtitodo Andrea</title>
    <style>
        :root {
            --orange:      #e67e22;
            --orange-dark: #d35400;
            --orange-deep: #b94600;
            --orange-light:#fff3e8;
            --blue:        #004b93;
            --blue-light:  #e8f0fb;
            --text:        #2c3e50;
            --bg:          #fdf3e7;
            --white:       #ffffff;
            --nequi:       #51006a;
            --daviplata:   #ef3e36;
            --success:     #27ae60;
            --border:      #e8d5c0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(160deg, #fdf3e7 0%, #fce8d0 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px 16px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── CARD ── */
        .card {
            max-width: 580px;
            width: 100%;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 6px 24px rgba(230,126,34,0.13);
            border-top: 7px solid var(--orange);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-body { padding: 28px 24px; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 50%, #b94600 100%);
            padding: 28px 20px 22px;
            text-align: center;
        }

        .logo-wrap {
            width: 120px;
            height: 120px;
            margin: 0 auto 14px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--white);
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            background: white;
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header h1 {
            color: white;
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 4px;
        }

        .header .subtitle {
            color: rgba(255,255,255,0.88);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 22px; }

        .form-label {
            display: block;
            margin-bottom: 9px;
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
        }

        .req { color: var(--orange-dark); }

        /* Radio buttons */
        .radio-group { display: flex; gap: 14px; }

        .radio-option { flex: 1; position: relative; }
        .radio-option input[type="radio"] { display: none; }

        .radio-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 10px;
            background: #f8f9fa;
            border: 2.5px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.25s ease;
            user-select: none;
        }

        .radio-label .dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid #aaa;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .radio-option input[type="radio"]:checked + .radio-label.nequi {
            background: #51006a;
            color: white;
            border-color: #51006a;
            box-shadow: 0 4px 12px rgba(81,0,106,0.3);
        }
        .radio-option input[type="radio"]:checked + .radio-label.nequi .dot {
            background: white; border-color: white;
        }

        .radio-option input[type="radio"]:checked + .radio-label.daviplata {
            background: #ef3e36;
            color: white;
            border-color: #ef3e36;
            box-shadow: 0 4px 12px rgba(239,62,54,0.3);
        }
        .radio-option input[type="radio"]:checked + .radio-label.daviplata .dot {
            background: white; border-color: white;
        }

        /* Input valor */
        .input-wrap { position: relative; }
        .input-prefix {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 800;
            font-size: 16px;
            color: var(--orange-dark);
            pointer-events: none;
        }

        input[type="number"], textarea {
            width: 100%;
            padding: 13px 14px 13px 30px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            color: var(--text);
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea { padding-left: 14px; resize: vertical; min-height: 80px; }

        input[type="number"]:focus, textarea:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(230,126,34,0.15);
            outline: none;
            background: white;
        }

        /* Botón */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: white;
            border: none;
            padding: 15px;
            font-size: 17px;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            transition: filter 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(211,84,0,0.3);
            letter-spacing: 0.5px;
        }
        .btn-submit:hover { filter: brightness(1.08); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 13px 26px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.18);
            transition: transform 0.4s ease;
            z-index: 999;
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.ok    { background: #27ae60; }
        #toast.err   { background: #c0392b; }

        /* Spinner */
        .spinner { display:none; text-align:center; margin-top:10px; font-weight:700; color:var(--orange); font-size:14px; }

        /* ── HISTORIAL ── */
        .section-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--blue);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--orange-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-refresh {
            margin-left: auto;
            background: none;
            border: 2px solid var(--orange);
            color: var(--orange-dark);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-refresh:hover { background: var(--orange-light); }

        .history-list { max-height: 360px; overflow-y: auto; }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 13px 4px;
            border-bottom: 1px solid #f2e8de;
            gap: 12px;
        }
        .history-item:last-child { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }
        .badge.nequi     { background: var(--nequi); }
        .badge.daviplata { background: var(--daviplata); }

        .item-left { display: flex; flex-direction: column; gap: 4px; }
        .item-comment { font-size: 13px; color: #888; font-style: italic; }

        .item-right { text-align: right; flex-shrink: 0; }
        .item-amount { font-size: 16px; font-weight: 800; color: var(--success); }
        .item-date   { font-size: 11px; color: #aaa; margin-top: 3px; }

        .empty-msg { text-align: center; color: #bbb; padding: 24px 0; font-size: 14px; }

        /* Resumen total */
        .summary {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .summary-box {
            flex: 1;
            background: var(--orange-light);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .summary-box .s-label { font-size: 12px; color: #888; font-weight: 600; margin-bottom: 4px; }
        .summary-box .s-value { font-size: 18px; font-weight: 800; color: var(--orange-dark); }
        .summary-box.nequi-box   { background: #f3e6f8; }
        .summary-box.nequi-box .s-value { color: var(--nequi); }
        .summary-box.daviplata-box { background: #fdecea; }
        .summary-box.daviplata-box .s-value { color: var(--daviplata); }
    </style>
</head>

                        <span class="dot"></span> NEQUI
                    </label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="daviplata" name="banco" value="Daviplata">
                    <label for="daviplata" class="radio-label daviplata">
                        <span class="dot"></span> DAVIPLATA
                    </label>
                </div>
            </div>
            <div id="banco-error" style="color:#c0392b;font-size:13px;margin-top:6px;display:none;">⚠️ Selecciona Nequi o Daviplata.</div>
        </div>

        <div class="form-group">
            <label class="form-label" for="valor">Valor (COP) <span class="req">*</span></label>
            <div class="input-wrap">
                <span class="input-prefix">$</span>
                <input type="number" id="valor" placeholder="Ej: 25.000" min="1" step="1">
            </div>
            <div id="valor-error" style="color:#c0392b;font-size:13px;margin-top:6px;display:none;">⚠️ Ingresa un valor válido mayor a $0.</div>
        </div>

        <div class="form-group">
            <label class="form-label" for="comentarios">Comentarios <span style="color:#aaa;font-weight:400;">(opcional)</span></label>
            <textarea id="comentarios" placeholder="Detalles adicionales, nombre del cliente, producto…"></textarea>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="guardarPago()">
            ✅ Registrar Pago
        </button>
        <div class="spinner" id="loadingSpinner">⏳ Guardando registro…</div>
    </div>
</div>

<!-- ═══ HISTORIAL ═══ -->
<div class="card">
    <div class="card-body">
        <div class="section-title">
            📋 Últimos Pagos Registrados
            <button class="btn-refresh" onclick="cargarHistorial(true)">🔄 Actualizar</button>
        </div>

        <!-- Resumen por plataforma -->
        <div class="summary" id="summary" style="display:none;">
            <div class="summary-box nequi-box">
                <div class="s-label">NEQUI (hoy)</div>
                <div class="s-value" id="total-nequi">/bin/sh</div>
            </div>
            <div class="summary-box daviplata-box">
                <div class="s-label">DAVIPLATA (hoy)</div>
                <div class="s-value" id="total-daviplata">/bin/sh</div>
            </div>
        </div>

        <div class="history-list" id="historyList">
            <div class="empty-msg">Cargando historial…</div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby9f6os33h2xxihioa167mxgR5mukJnNnAbOXOfTqUAP-c7zFaM0HwK1m4-6FPwtt1x/exec";

    // ── TOAST ─────────────────────────────────────────────────
    function showToast(msg, tipo = 'ok') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = tipo + ' show';
        setTimeout(() => t.className = tipo, 3500);
    }

    // ── VALIDAR Y GUARDAR ─────────────────────────────────────
    function guardarPago() {
        // Validaciones
        const bancoEl = document.querySelector('input[name="banco"]:checked');
        const valorEl = document.getElementById('valor');
        const bancoErr = document.getElementById('banco-error');
        const valorErr = document.getElementById('valor-error');

        let ok = true;

        if (!bancoEl) {
            bancoErr.style.display = 'block'; ok = false;
        } else { bancoErr.style.display = 'none'; }

        const valor = parseFloat(valorEl.value);
        if (!valorEl.value || isNaN(valor) || valor <= 0) {
            valorErr.style.display = 'block'; ok = false;
        } else { valorErr.style.display = 'none'; }

        if (!ok) return;

        const btn     = document.getElementById('submitBtn');
        const spinner = document.getElementById('loadingSpinner');
        btn.disabled  = true;
        spinner.style.display = 'block';

        const formData = {
            banco:        bancoEl.value,
            valor:        valor,
            comentarios:  document.getElementById('comentarios').value.trim()
        };

        fetch(WEB_APP_URL, {
            method:  'POST',
            mode:    'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(formData)
        })
        .then(() => {
            showToast('✅ ¡Pago registrado con éxito!', 'ok');
            // Limpia el form
            document.querySelector('input[name="banco"]:checked').checked = false;
            valorEl.value = '';
            document.getElementById('comentarios').value = '';
            // Agrega al historial local inmediatamente
            agregarLocal(formData);
            // Recarga desde el servidor tras 1.5 s
            setTimeout(() => cargarHistorial(), 1500);
        })
        .catch(err => {
            showToast('❌ Error al guardar. Revisa tu conexión.', 'err');
            console.error(err);
        })
        .finally(() => {
            btn.disabled = false;
            spinner.style.display = 'none';
        });
    }

    // ── AGREGAR AL HISTORIAL LOCAL (feedback instantáneo) ─────
    function agregarLocal(data) {
        const list    = document.getElementById('historyList');
        const empties = list.querySelectorAll('.empty-msg');
        empties.forEach(e => e.remove());

        const fecha   = new Date().toLocaleString('es-CO', { timeZone: 'America/Bogota' });
        const badge   = data.banco.toLowerCase();
        const monto   = formatCOP(data.valor);

        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="item-left">
                <div><span class="badge ${badge}">${data.banco.toUpperCase()}</span></div>
                <div class="item-comment">${data.comentarios || 'Sin comentarios'}</div>
            </div>
            <div class="item-right">
                <div class="item-amount">${monto}</div>
                <div class="item-date">${fecha}</div>
            </div>
        `;
        list.insertBefore(item, list.firstChild);
    }

    // ── CARGAR HISTORIAL DESDE SHEETS ─────────────────────────
    function cargarHistorial(manual = false) {
        if (manual) showToast('🔄 Actualizando historial…', 'ok');

        fetch(WEB_APP_URL + '?action=getHistory&t=' + Date.now())
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            if (!data.length) {
                list.innerHTML = '<div class="empty-msg">No hay pagos registrados aún.</div>';
                return;
            }

            // Totales del día de hoy
            // Construimos "dd/MM/yyyy" manualmente para que coincida exactamente con el formato del Sheet
            const ahora = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Bogota' }));
            const dd  = String(ahora.getDate()).padStart(2, '0');
            const mm  = String(ahora.getMonth() + 1).padStart(2, '0');
            const yyyy = ahora.getFullYear();
            const prefixHoy = dd + '/' + mm + '/' + yyyy; // Ej: "25/06/2026"
            let totalN = 0, totalD = 0;

            data.forEach(p => {
                const badge = (p.banco || '').toLowerCase();
                const monto = formatCOP(p.valor);

                // Sumar totales del día — comparamos el prefijo dd/MM/yyyy
                if (p.fecha && p.fecha.startsWith(prefixHoy)) {
                    if (badge === 'nequi')     totalN += parseFloat(p.valor) || 0;
                    if (badge === 'daviplata') totalD += parseFloat(p.valor) || 0;
                }

                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="item-left">
                        <div><span class="badge ${badge}">${(p.banco || '').toUpperCase()}</span></div>
                        <div class="item-comment">${p.comentarios || 'Sin comentarios'}</div>
                    </div>
                    <div class="item-right">
                        <div class="item-amount">${monto}</div>
                        <div class="item-date">${p.fecha || ''}</div>
                    </div>
                `;
                list.appendChild(item);
            });

            // Mostrar resumen
            document.getElementById('summary').style.display = 'flex';
            document.getElementById('total-nequi').textContent    = formatCOP(totalN);
            document.getElementById('total-daviplata').textContent = formatCOP(totalD);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('historyList').innerHTML =
                '<div class="empty-msg" style="color:#c0392b;">No se pudo cargar el historial. Toca "Actualizar".</div>';
        });
    }

    // ── FORMATEAR MONEDA ──────────────────────────────────────
    function formatCOP(val) {
        return new Intl.NumberFormat('es-CO', {
            style: 'currency', currency: 'COP', maximumFractionDigits: 0
        }).format(parseFloat(val) || 0);
    }

    // ── INIT ──────────────────────────────────────────────────
    window.onload = cargarHistorial;
</script>
</body>
</html>
